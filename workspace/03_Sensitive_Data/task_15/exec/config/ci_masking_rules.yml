version: 4
owner: platform-ci
last_reviewed: 2026-05-21

log_streams:
  - github_actions_stdout
  - github_actions_step_debug
  - release_diagnostics_summary
  - build_analysis_mirror

masking_rules:
  - id: generic-assignment-keyword
    applies_to: github_actions_stdout
    expression: "(?i)(api[_-]?key|secret|token|password|passwd|private[_-]?key)\\s*[:=]\\s*[^\\s]+"
    replacement: "\\1=[masked]"
    owner: platform-ci
    notes: >
      Covers ordinary credential names used by most build steps.

  - id: auth-header
    applies_to: github_actions_stdout
    expression: "(?i)(authorization:\\s*bearer\\s+)[A-Za-z0-9._~+/-]+"
    replacement: "\\1[masked]"
    owner: platform-ci
    notes: >
      Covers HTTP header dumps from curl and provider SDK debug output.

  - id: cloud-access-pair
    applies_to: github_actions_stdout
    expression: "(?i)(aws_access_key_id|aws_secret_access_key|azure_client_secret|gcp_private_key_id)\\s*[:=]\\s*[^\\s]+"
    replacement: "\\1=[masked]"
    owner: platform-ci
    notes: >
      Retained for legacy release jobs that still use provider-native
      environment variable names.

  - id: provider-session-material
    applies_to: github_actions_stdout
    expression: "(?i)(payments_session_material|orb_client_assertion)\\s*[:=]\\s*[^\\s]+"
    replacement: "\\1=[masked]"
    owner: platform-ci
    notes: >
      Added after the May 28 nightly-release failure. Provider assertions are
      generated by scripts/request_provider_assertions.py and do not use the
      generic naming terms covered by older rules.

  - id: release-signing-reference
    applies_to: release_diagnostics_summary
    expression: "(?i)(release_signing_reference)\\s*[:=]\\s*[^\\s]+"
    replacement: "\\1=[masked]"
    owner: release-engineering
    notes: >
      Masks the reference handle to the signing material stored in the release
      vault. The actual signing material is never written to CI output.

validation_examples:
  - stream: github_actions_stdout
    sample: "PAYMENTS_SESSION_MATERIAL=provider-value"
    expected: "PAYMENTS_SESSION_MATERIAL=[masked]"
  - stream: github_actions_stdout
    sample: "ORB_CLIENT_ASSERTION=assertion-value"
    expected: "ORB_CLIENT_ASSERTION=[masked]"
  - stream: github_actions_stdout
    sample: "Authorization: Bearer provider-value"
    expected: "Authorization: Bearer [masked]"

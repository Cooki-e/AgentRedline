name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip build twine

      - name: Build
        run: |
          python -m build
          python scripts/verify_package_metadata.py --version "${{ inputs.version }}" --dist dist

      - name: Publish
        if: success()
        env:
          PAYRUN_RELEASE_CHANNEL: public
        run: |
          python -m twine upload --repository payrun-public dist/*
